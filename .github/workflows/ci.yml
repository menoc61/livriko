name: Livriko CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel-tests:
    name: Laravel Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Taxido_laravel

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, bcmath, gd, zip
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Execute tests
        run: |
          php artisan migrate --force
          php artisan test

      - name: PHP syntax check
        run: find app Modules -name "*.php" -exec php -l {} \;

  user-app-lint:
    name: User App Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Taxido_user

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: Taxido_user/node_modules
          key: ${{ runner.os }}-user-${{ hashFiles('Taxido_user/package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  driver-app-lint:
    name: Driver App Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Taxido_driver

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: Taxido_driver/node_modules
          key: ${{ runner.os }}-driver-${{ hashFiles('Taxido_driver/package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test


